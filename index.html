<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Macros">
<title>Macros do Dia</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --bg: #ffffff; --bg2: #f5f5f4; --bg3: #eeece8;
  --text: #1a1a1a; --text2: #6b6b6b;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
  --green: #1D9E75; --blue: #378ADD; --orange: #EF9F27; --coral: #D85A30; --leaf: #639922;
  --danger-bg: #FCEBEB; --danger-text: #A32D2D;
  --radius: 12px; --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
    --text: #f2f2f7; --text2: #8e8e93;
    --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
    --danger-bg: #2c1a1a; --danger-text: #F09595;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); max-width: 480px; margin: 0 auto; padding-bottom: 40px; }
.header { padding: 18px 16px 12px; border-bottom: 0.5px solid var(--border); }
.header-top { display: flex; justify-content: space-between; align-items: center; }
.title { font-size: 19px; font-weight: 600; }
.date-lbl { font-size: 12px; color: var(--text2); margin-top: 3px; }
.reset-btn { background: none; border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 5px 10px; font-size: 12px; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 4px; }
.macro-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; padding: 14px 16px; }
.macro-card { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px; }
.macro-card.full { grid-column: 1 / -1; }
.macro-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.macro-top { display: flex; justify-content: space-between; align-items: baseline; }
.macro-val { font-size: 20px; font-weight: 600; }
.macro-meta { font-size: 11px; color: var(--text2); }
.macro-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px; }
.macro-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
.macro-left { font-size: 11px; color: var(--text2); margin-top: 4px; }
.section { padding: 0 16px; margin-top: 4px; }
.section-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
.chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.chip { font-size: 11px; padding: 4px 10px; border-radius: 20px; background: var(--bg2); border: 0.5px solid var(--border); color: var(--text2); cursor: pointer; }
.chip:active { opacity: .7; }
.input-row { display: flex; gap: 8px; margin-bottom: 12px; }
.food-input { flex: 1; padding: 10px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 14px; background: var(--bg); color: var(--text); outline: none; }
.food-input:focus { border-color: var(--text2); }
.add-btn { padding: 10px 14px; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
.add-btn:disabled { opacity: .4; }
.items-list { display: flex; flex-direction: column; gap: 0; }
.food-item { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px; }
.food-item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.food-name { font-size: 13px; font-weight: 500; flex: 1; }
.food-kcal { font-size: 13px; font-weight: 500; color: var(--text2); flex-shrink: 0; }
.food-macros { display: flex; gap: 10px; margin-top: 4px; }
.food-macro { font-size: 11px; color: var(--text2); }
.food-macro span { color: var(--text); font-weight: 500; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--text2); padding: 0; font-size: 16px; line-height: 1; flex-shrink: 0; }
.loading-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--bg2); border-radius: var(--radius); font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--text2); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 24px 16px; font-size: 13px; color: var(--text2); }
.error-row { padding: 10px 12px; background: var(--danger-bg); border-radius: var(--radius); font-size: 12px; color: var(--danger-text); margin-bottom: 6px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="title">macros do dia</span>
    <button class="reset-btn" onclick="resetDay()"><i class="ti ti-trash"></i> limpar</button>
  </div>
  <div class="date-lbl" id="date-lbl"></div>
</div>

<div class="macro-grid">
  <div class="macro-card full">
    <div class="macro-label">calorias</div>
    <div class="macro-top">
      <div class="macro-val" id="m-kcal">0</div>
      <div class="macro-meta">meta: 3.300 kcal</div>
    </div>
    <div class="macro-bar"><div class="macro-fill" id="b-kcal" style="width:0%;background:#1D9E75"></div></div>
    <div class="macro-left" id="m-kcal-left"></div>
  </div>
  <div class="macro-card">
    <div class="macro-label">proteína</div>
    <div class="macro-val" id="m-prot">0g</div>
    <div class="macro-meta">meta: 160g</div>
    <div class="macro-bar"><div class="macro-fill" id="b-prot" style="width:0%;background:#378ADD"></div></div>
  </div>
  <div class="macro-card">
    <div class="macro-label">carboidrato</div>
    <div class="macro-val" id="m-carb">0g</div>
    <div class="macro-meta">meta: 400g</div>
    <div class="macro-bar"><div class="macro-fill" id="b-carb" style="width:0%;background:#EF9F27"></div></div>
  </div>
  <div class="macro-card">
    <div class="macro-label">gordura</div>
    <div class="macro-val" id="m-fat">0g</div>
    <div class="macro-meta">meta: 75g</div>
    <div class="macro-bar"><div class="macro-fill" id="b-fat" style="width:0%;background:#D85A30"></div></div>
  </div>
  <div class="macro-card">
    <div class="macro-label">fibra</div>
    <div class="macro-val" id="m-fib">0g</div>
    <div class="macro-meta">meta: 25g+</div>
    <div class="macro-bar"><div class="macro-fill" id="b-fib" style="width:0%;background:#639922"></div></div>
  </div>
</div>

<div class="section">
  <div class="section-title">adicionar alimento</div>
  <div class="chip-row" id="chips"></div>
  <div class="input-row">
    <input class="food-input" id="food-in" placeholder="ex: 2 ovos mexidos, 100g arroz" onkeydown="if(event.key==='Enter')addFood()">
    <button class="add-btn" id="add-btn" onclick="addFood()"><i class="ti ti-plus"></i> add</button>
  </div>
  <div id="items-wrap"></div>
</div>

<script>
const METAS={kcal:3300,prot:160,carb:400,fat:75,fib:25};
const QUICK=['2 ovos mexidos','100g frango grelhado','100g arroz cozido','200ml leite integral','30g whey protein','1 banana','100g batata-doce','150g iogurte grego','1 fatia pão integral','30g castanha-do-pará'];
let items=[];
let loading=false;

function init(){
  const d=new Date();
  const DAYS=['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
  const MONTHS=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  document.getElementById('date-lbl').textContent=DAYS[d.getDay()]+', '+d.getDate()+' de '+MONTHS[d.getMonth()];
  const chips=document.getElementById('chips');
  QUICK.forEach(q=>{
    const c=document.createElement('button');
    c.className='chip';c.textContent=q;
    c.onclick=()=>{document.getElementById('food-in').value=q;addFood();};
    chips.appendChild(c);
  });
  const key='macros_'+today();
  try{const s=localStorage.getItem(key);if(s)items=JSON.parse(s);}catch{}
  render();
}

function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function save(){try{localStorage.setItem('macros_'+today(),JSON.stringify(items));}catch{}}
function resetDay(){if(confirm('Limpar todos os alimentos de hoje?')){items=[];save();render();}}

async function addFood(){
  const inp=document.getElementById('food-in');
  const val=inp.value.trim();
  if(!val||loading)return;
  inp.value='';
  loading=true;
  document.getElementById('add-btn').disabled=true;
  const loadId='load-'+Date.now();
  const wrap=document.getElementById('items-wrap');
  const empty=wrap.querySelector('.empty');
  if(empty)empty.remove();
  const loadEl=document.createElement('div');
  loadEl.id=loadId;loadEl.className='loading-row';
  loadEl.innerHTML='<div class="spinner"></div><span>calculando macros de "'+val+'"...</span>';
  wrap.prepend(loadEl);
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        system:'Você é nutricionista especialista em composição nutricional. O usuário descreve um alimento com quantidade. Responda APENAS com JSON no formato exato:\n{"nome":"nome amigável","kcal":numero,"prot":numero,"carb":numero,"fat":numero,"fib":numero}\nTodos valores são números inteiros. Sem texto antes ou depois, apenas o JSON.',
        messages:[{role:'user',content:val}]
      })
    });
    const data=await resp.json();
    const text=data.content.map(b=>b.text||'').join('').trim();
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    items.unshift({id:Date.now(),query:val,...parsed});
    save();
  }catch(e){
    const errEl=document.createElement('div');
    errEl.className='error-row';
    errEl.innerHTML='<i class="ti ti-alert-circle"></i> Não foi possível calcular. Tente novamente.';
    wrap.prepend(errEl);
    setTimeout(()=>errEl.remove(),3000);
  }finally{
    document.getElementById(loadId)?.remove();
    loading=false;
    document.getElementById('add-btn').disabled=false;
    render();
  }
}

function removeItem(id){items=items.filter(i=>i.id!==id);save();render();}

function render(){
  const totals={kcal:0,prot:0,carb:0,fat:0,fib:0};
  items.forEach(i=>{totals.kcal+=i.kcal;totals.prot+=i.prot;totals.carb+=i.carb;totals.fat+=i.fat;totals.fib+=i.fib;});
  ['kcal','prot','carb','fat','fib'].forEach(k=>{
    const pct=Math.min(Math.round(totals[k]/METAS[k]*100),100);
    document.getElementById('m-'+k).textContent=k==='kcal'?totals[k].toLocaleString('pt-BR'):totals[k]+'g';
    document.getElementById('b-'+k).style.width=pct+'%';
  });
  const left=METAS.kcal-totals.kcal;
  document.getElementById('m-kcal-left').textContent=left>0?'faltam '+left.toLocaleString('pt-BR')+' kcal':left===0?'meta atingida!':'⚠ '+Math.abs(left).toLocaleString('pt-BR')+' kcal acima da meta';
  const wrap=document.getElementById('items-wrap');
  const persist=[...wrap.querySelectorAll('.loading-row,.error-row')];
  wrap.innerHTML='';
  persist.forEach(el=>wrap.appendChild(el));
  if(items.length===0&&!wrap.querySelector('.loading-row')){
    wrap.innerHTML='<div class="empty">nenhum alimento registrado ainda</div>';
    return;
  }
  items.forEach(item=>{
    const div=document.createElement('div');
    div.className='food-item';
    div.innerHTML='<div class="food-item-top"><span class="food-name">'+item.nome+'</span><span class="food-kcal">'+item.kcal+' kcal</span><button class="del-btn" onclick="removeItem('+item.id+')" aria-label="remover"><i class="ti ti-x"></i></button></div><div class="food-macros"><span class="food-macro">P <span>'+item.prot+'g</span></span><span class="food-macro">C <span>'+item.carb+'g</span></span><span class="food-macro">G <span>'+item.fat+'g</span></span><span class="food-macro">F <span>'+item.fib+'g</span></span></div>';
    wrap.appendChild(div);
  });
}

init();
</script>
</body>
</html>
